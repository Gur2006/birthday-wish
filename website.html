<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Marks Management</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2,#ff758c);
padding:30px;
}

.container{
width:95%;
max-width:1100px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
color:white;
}

h1{
text-align:center;
margin-bottom:20px;
font-size:35px;
}

.form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.form input{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:.3s;
}

.add{
background:#00c853;
color:white;
}

.add:hover{
background:#00a844;
transform:scale(1.05);
}

.search{
margin-bottom:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:15px;
}

th{
background:#00bcd4;
padding:12px;
}

td{
padding:12px;
text-align:center;
background:rgba(255,255,255,.1);
}

tr:hover td{
background:rgba(255,255,255,.2);
}

.delete{
background:#ff1744;
color:white;
padding:8px 14px;
}

.delete:hover{
background:#d50032;
}

.footer{
margin-top:20px;
text-align:center;
font-size:18px;
font-weight:bold;
}

@media(max-width:700px){
table{
display:block;
overflow-x:auto;
}
}
</style>

</head>
<body>

<div class="container">

<h1>🎓 Student Marks Management System</h1>

<div class="form">
<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number">
<input type="text" id="class" placeholder="Class">
<input type="number" id="marks" placeholder="Marks (Out of 100)">
<button class="add" onclick="addStudent()">Add Student</button>
</div>

<input class="search" type="text" id="search" placeholder="🔍 Search Student..." onkeyup="displayStudents()">

<table>

<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Class</th>
<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="footer">
Total Students :
<span id="count">0</span>
</div>

</div>

<script>

let students=JSON.parse(localStorage.getItem("students")) || [];

function grade(mark){
if(mark>=90) return "A+";
if(mark>=80) return "A";
if(mark>=70) return "B";
if(mark>=60) return "C";
if(mark>=50) return "D";
return "F";
}

function save(){
localStorage.setItem("students",JSON.stringify(students));
}

function addStudent(){

let name=document.getElementById("name").value.trim();
let roll=document.getElementById("roll").value.trim();
let cls=document.getElementById("class").value.trim();
let marks=Number(document.getElementById("marks").value);

if(name==""||roll==""||cls==""||isNaN(marks)){
alert("Please fill all fields.");
return;
}

students.push({
name,
roll,
cls,
marks
});

save();
displayStudents();

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("class").value="";
document.getElementById("marks").value="";

}

function deleteStudent(index){
students.splice(index,1);
save();
displayStudents();
}

function displayStudents(){

let keyword=document.getElementById("search").value.toLowerCase();

let body=document.getElementById("tableBody");

body.innerHTML="";

students.forEach((s,index)=>{

if(
s.name.toLowerCase().includes(keyword) ||
s.roll.toLowerCase().includes(keyword)
){

body.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.roll}</td>
<td>${s.cls}</td>
<td>${s.marks}</td>
<td>${s.marks}%</td>
<td>${grade(s.marks)}</td>
<td><button class="delete" onclick="deleteStudent(${index})">Delete</button></td>
</tr>
`;

}

});

document.getElementById("count").innerText=students.length;

}

displayStudents();

</script>

</body>
</html>
